repos:
  # Universal file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Go formatting and imports (file-level hooks from external repo)
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
        args: ['-w']
      - id: go-imports
        args: ['-w']

  # Go build, tidy, tests, and schema check (need backend/ working directory)
  - repo: local
    hooks:
      - id: go-build
        name: go build
        entry: bash -c 'cd backend && go build ./...'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'cd backend && go mod tidy'
        language: system
        pass_filenames: false
        types: [go]

      - id: go-test-short
        name: go test (short)
        entry: bash -c 'cd backend && go test -short -race ./...'
        language: system
        pass_filenames: false
        types: [go]

      - id: check-golden-schema-sync
        name: golden_schema.sql must be updated when migrations change
        language: script
        entry: backend/scripts/check-golden-schema.sh
        pass_filenames: false
        files: ^backend/internal/database/(migrations/|testdata/golden_schema\.sql)

      # Backend/Docker changes -> Integration tests only (no E2E for speed)
      - id: docker-integration-test-backend
        name: docker-integration-test (backend changes)
        entry: bash -c './scripts/test-docker-integration.sh'
        language: system
        pass_filenames: false
        always_run: false
        files: ^(backend/|docker-compose\.yml|backend/go\.mod|backend/go\.sum|backend/Dockerfile)$
        exclude: ^frontend/

      # Frontend changes -> Integration tests + E2E tests (comprehensive)
      - id: docker-integration-test-e2e
        name: docker-integration-test + E2E (frontend changes)
        entry: bash -c 'RUN_E2E_TESTS=true ./scripts/test-docker-integration.sh'
        language: system
        pass_filenames: false
        always_run: false
        files: ^(frontend/src/|frontend/e2e/|frontend/Dockerfile|frontend/nginx\.conf)
        exclude: ^backend/

  # Frontend linting
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.4
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.4"]
        files: ^frontend/src/.*\.(js|jsx|ts|tsx|css|json)$

  # Frontend unit testing
  - repo: local
    hooks:
      - id: vitest-frontend
        name: vitest-frontend
        entry: bash -c 'cd frontend && pnpm run test:ci'
        language: system
        types: [javascript]
        files: ^frontend/src/.*\.(js|jsx)$
        pass_filenames: false
        always_run: false
