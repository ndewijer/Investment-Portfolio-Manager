repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      # Run the linter
      - id: ruff
        pass_filenames: false
        args: [--fix]
      # Run the formatter
      - id: ruff-format
        language_version: python3.13

  # Python testing and coverage
  - repo: local
    hooks:
      - id: pytest-backend
        name: pytest-backend
        entry: bash -c 'uv run pytest'
        language: system
        types: [python]
        pass_filenames: false
        always_run: false

      # Backend/Docker changes → Integration tests only (no E2E for speed)
      - id: docker-integration-test-backend
        name: docker-integration-test (backend changes)
        entry: bash -c './scripts/test-docker-integration.sh'
        language: system
        pass_filenames: false
        always_run: false
        files: ^(backend/|docker-compose\.yml|pyproject\.toml|uv\.lock|backend/Dockerfile)$
        exclude: ^frontend/

      # Frontend changes → Integration tests + E2E tests (comprehensive)
      - id: docker-integration-test-e2e
        name: docker-integration-test + E2E (frontend changes)
        entry: bash -c 'RUN_E2E_TESTS=true ./scripts/test-docker-integration.sh'
        language: system
        pass_filenames: false
        always_run: false
        files: ^(frontend/src/|frontend/e2e/|frontend/Dockerfile|frontend/nginx\.conf)
        exclude: ^backend/

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.4
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.4"]
        files: ^frontend/src/.*\.(js|jsx|ts|tsx|css|json)$

  # Frontend unit testing
  # Note: E2E tests (Playwright) run automatically in pre-commit when frontend files change.
  # They run against Docker stack along with integration tests.
  - repo: local
    hooks:
      - id: vitest-frontend
        name: vitest-frontend
        entry: bash -c 'cd frontend && pnpm run test:ci'
        language: system
        types: [javascript]
        files: ^frontend/src/.*\.(js|jsx)$
        pass_filenames: false
        always_run: false
